<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 Hangman Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT & BASE
   ============================================================ */
:root {
  --bg: #FFF8F0;
  --panel: #FFFFFF;
  --accent1: #FF6B6B;
  --accent2: #4ECDC4;
  --accent3: #FFE66D;
  --accent4: #A78BFA;
  --ink: #2D2D2D;
  --muted: #9CA3AF;
  --border: #E5E7EB;
  --gallows: #5C4033;
  --body-color: #FF6B6B;
  --shadow: 0 4px 0 rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--ink);
}

#hm-root {
  max-width: 820px;
  margin: 0 auto;
  padding: 28px 20px 36px;
}

/* ============================================================
   TITLE & SUBTITLE
   ============================================================ */
h1.hm-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.8rem;
  text-align: center;
  color: var(--accent1);
  letter-spacing: 2px;
  margin-bottom: 4px;
  text-shadow: 3px 3px 0 rgba(255,107,107,0.2);
}

.hm-subtitle {
  text-align: center;
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 24px;
  font-weight: 600;
}

/* ============================================================
   MAIN LAYOUT (2-column)
   ============================================================ */
.hm-main {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 20px;
}

.hm-left {
  flex: 0 0 240px;
  background: var(--panel);
  border-radius: 20px;
  border: 2.5px solid var(--border);
  padding: 16px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hm-svg-wrap { width: 208px; height: 244px; }

.hm-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ============================================================
   LIVES BAR
   ============================================================ */
.lives-bar {
  display: flex;
  gap: 5px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.life-heart {
  font-size: 20px;
  transition: all 0.3s;
}
.life-heart.lost {
  filter: grayscale(1);
  opacity: 0.35;
  transform: scale(0.85);
}

/* ============================================================
   WRONG LETTERS
   ============================================================ */
.wrong-letters {
  font-size: 0.8rem;
  color: var(--accent1);
  font-weight: 800;
  margin-top: 8px;
  text-align: center;
  min-height: 20px;
  letter-spacing: 2px;
}

/* ============================================================
   CATEGORY BOX
   ============================================================ */
.hm-category-box {
  background: var(--panel);
  border-radius: 16px;
  border: 2.5px solid var(--border);
  padding: 16px 20px;
  box-shadow: var(--shadow);
}

.cat-label {
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent2);
  margin-bottom: 4px;
}

.cat-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  color: var(--ink);
}

.hm-hint {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 600;
}

/* ============================================================
   WORD BOX
   ============================================================ */
.hm-word-box {
  background: var(--panel);
  border-radius: 16px;
  border: 2.5px solid var(--border);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  flex: 1;
}

.word-label {
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent1);
  margin-bottom: 12px;
}

.hm-word-display {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: flex-end;
}

.letter-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.letter-char {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
  min-width: 32px;
  text-align: center;
  color: var(--ink);
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.letter-char.revealed {
  animation: popIn 0.3s cubic-bezier(0.36,0.07,0.19,0.97);
}

.letter-dash {
  width: 32px;
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.3s;
}

.letter-slot.revealed .letter-dash { background: var(--accent2); }
.letter-slot.space { width: 18px; }
.letter-slot.space .letter-dash { opacity: 0; }

@keyframes popIn {
  0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* ============================================================
   KEYBOARD
   ============================================================ */
.hm-keyboard {
  background: var(--panel);
  border-radius: 16px;
  border: 2.5px solid var(--border);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}

.kb-label {
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent4);
  margin-bottom: 10px;
}

.kb-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.kb-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 0 var(--border);
  user-select: none;
}

.kb-btn:hover:not(:disabled) {
  background: var(--accent3);
  border-color: #d4b800;
  transform: translateY(-2px);
  box-shadow: 0 5px 0 #d4b800;
}

.kb-btn:active:not(:disabled) {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--border);
}

.kb-btn.correct {
  background: #DCFCE7;
  border-color: #4ADE80;
  color: #166534;
  box-shadow: 0 3px 0 #4ADE80;
  opacity: 0.5;
  cursor: not-allowed;
}

.kb-btn.wrong {
  background: #FEE2E2;
  border-color: #FCA5A5;
  color: #991B1B;
  box-shadow: 0 3px 0 #FCA5A5;
  opacity: 0.4;
  cursor: not-allowed;
}

.kb-btn:disabled { cursor: not-allowed; }

/* ============================================================
   HOME PAGE
   ============================================================ */
.home-right {
  justify-content: center;
  align-items: center;
  min-height: 244px;
}

.home-tagline {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 700;
  margin-top: 10px;
  text-align: center;
}

.home-welcome {
  text-align: center;
  padding: 8px 0;
}

.welcome-emoji {
  font-size: 3rem;
  margin-bottom: 6px;
  display: block;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
  color: var(--ink);
  margin-bottom: 8px;
}

.welcome-sub {
  font-size: 0.9rem;
  color: var(--muted);
  font-weight: 600;
  line-height: 1.5;
}

.btn-play {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
  letter-spacing: 2px;
  background: var(--accent1);
  color: white;
  border: none;
  border-radius: 18px;
  padding: 14px 52px;
  cursor: pointer;
  box-shadow: 0 6px 0 #c0392b;
  transition: all 0.15s;
  width: 100%;
}

.btn-play:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 #c0392b;
  background: #ff5252;
}

.btn-play:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #c0392b;
}

.home-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.badge-pill {
  font-size: 0.78rem;
  font-weight: 700;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 999px;
  padding: 5px 12px;
  color: var(--ink);
}

/* ============================================================
   SELECTION SCREENS (Mode / Difficulty / Description)
   ============================================================ */
.selection-header {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.sel-label {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--ink);
}

.sel-mode-badge {
  font-size: 0.8rem;
  font-weight: 800;
  background: var(--accent3);
  border-radius: 999px;
  padding: 4px 12px;
  color: var(--ink);
}

/* Mode Cards */
.mode-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.mode-card {
  font-family: 'Nunito', sans-serif;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border-radius: 16px;
  border: 2.5px solid var(--mc, #ccc);
  background: var(--panel);
  cursor: pointer;
  box-shadow: 0 4px 0 var(--ms, #999);
  transition: all 0.15s;
  text-align: left;
}

.mode-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 7px 0 var(--ms, #999);
  background: #FFFBF0;
}

.mode-card:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--ms, #999);
}

.mode-emoji {
  font-size: 1.8rem;
  flex-shrink: 0;
}

.mode-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  color: var(--ink);
}

.mode-tiny-desc {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 600;
  display: block;
}

/* Difficulty Cards */
.diff-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.diff-card {
  font-family: 'Nunito', sans-serif;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 16px;
  border: 2.5px solid var(--dc, #ccc);
  background: var(--panel);
  cursor: pointer;
  box-shadow: 0 4px 0 var(--ds, #999);
  transition: all 0.15s;
  text-align: left;
}

.diff-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 7px 0 var(--ds, #999);
  background: #FFFBF0;
}

.diff-card:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--ds, #999);
}

.diff-emoji { font-size: 1.8rem; flex-shrink: 0; }
.diff-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  color: var(--ink);
}
.diff-desc {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 600;
}

/* Description Card */
.desc-card {
  background: var(--panel);
  border: 2.5px solid var(--mc, #ccc);
  border-radius: 20px;
  padding: 22px 22px;
  box-shadow: var(--shadow);
  text-align: center;
}

.desc-icon { font-size: 3rem; margin-bottom: 8px; }

.desc-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  color: var(--ink);
  margin-bottom: 10px;
}

.desc-text {
  font-size: 0.95rem;
  color: #555;
  line-height: 1.6;
  font-weight: 600;
  margin-bottom: 14px;
}

.desc-pills {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.desc-pill {
  font-size: 0.8rem;
  font-weight: 800;
  border-radius: 999px;
  padding: 5px 14px;
}

/* Start / Back Buttons */
.btn-start {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  letter-spacing: 1px;
  background: var(--mc, var(--accent2));
  color: white;
  border: none;
  border-radius: 16px;
  padding: 13px 30px;
  cursor: pointer;
  box-shadow: 0 5px 0 var(--ms, #888);
  transition: all 0.15s;
  width: 100%;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 0 var(--ms, #888);
}

.btn-start:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 var(--ms, #888);
}

.btn-back {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  background: transparent;
  color: var(--muted);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.15s;
  align-self: flex-start;
}

.btn-back:hover {
  background: var(--border);
  color: var(--ink);
  transform: translateY(-2px);
}

/* ============================================================
   TIME TRIAL BAR
   ============================================================ */
.tt-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--panel);
  border: 2.5px solid var(--border);
  border-radius: 16px;
  padding: 10px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.tt-timer {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--accent2);
  transition: color 0.3s;
}

.tt-timer.danger {
  color: var(--accent1);
  animation: pulse 0.5s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.tt-score {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--accent4);
}

.tt-flash {
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  color: #16a34a;
  animation: flashUp 0.8s forwards;
}

@keyframes flashUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* ============================================================
   HARDCORE BADGE
   ============================================================ */
.hardcore-badge {
  margin-top: 8px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.85rem;
  color: white;
  background: var(--accent4);
  border-radius: 999px;
  padding: 4px 14px;
  text-align: center;
}

/* ============================================================
   GAME RESULT OVERLAY
   ============================================================ */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.result-card {
  background: var(--panel);
  border-radius: 24px;
  padding: 36px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: zoomIn 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
  max-width: 380px;
  width: 90%;
}

@keyframes zoomIn {
  0% { transform: scale(0.7); opacity: 0; }
  70% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

.result-emoji {
  font-size: 4rem;
  margin-bottom: 8px;
  display: block;
}

.result-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.result-overlay.win .result-title { color: #16a34a; }
.result-overlay.lose .result-title { color: var(--accent1); }
.result-overlay.timeout .result-title { color: var(--accent4); }

.result-score {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  background: var(--accent3);
  border-radius: 12px;
  padding: 8px 16px;
  display: inline-block;
}

.result-word {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 20px;
}

.result-word strong {
  font-family: 'Fredoka One', cursive;
  color: var(--ink);
  font-size: 1.2rem;
}

.result-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-play-again {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  background: var(--accent1);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 11px 24px;
  cursor: pointer;
  box-shadow: 0 4px 0 #c0392b;
  transition: all 0.15s;
}

.btn-play-again:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 #c0392b;
}

.btn-play-again:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #c0392b;
}

.btn-home-small {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  background: var(--panel);
  color: var(--ink);
  border: 2.5px solid var(--border);
  border-radius: 14px;
  padding: 11px 24px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--border);
  transition: all 0.15s;
}

.btn-home-small:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 var(--border);
  background: var(--bg);
}

.btn-home-small:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--border);
}

/* ============================================================
   SVG PART ANIMATIONS
   ============================================================ */
.hm-part {
  transition: opacity 0.5s ease;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 560px) {
  .hm-main { flex-direction: column; }
  .hm-left { flex: none; width: 100%; }
  .kb-btn { width: 32px; height: 32px; font-size: 0.88rem; }
  h1.hm-title { font-size: 2rem; }
  .btn-play { font-size: 1.4rem; padding: 12px 30px; }
  .result-card { padding: 28px 22px; }
  .result-title { font-size: 1.8rem; }
  .tt-bar { gap: 8px; padding: 8px 14px; }
}
</style>

// Pick a random word from the given difficulty pool
function pickWord(difficulty) {
  const pool = WORD_DB[difficulty];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ============================================================
// WORD DISPLAY COMPONENT
// ============================================================
function WordDisplay({ word, guessed }) {
  return (
    <div className="hm-word-display">
      {word.split("").map((ch, i) => {
        if (ch === " ") {
          return (
            <div key={i} className="letter-slot space">
              <div className="letter-char"> </div>
              <div className="letter-dash"></div>
            </div>
          );
        }
        const revealed = guessed.has(ch);
        return (
          <div key={i} className={`letter-slot${revealed ? " revealed" : ""}`}>
            <div className={`letter-char${revealed ? " revealed" : ""}`}>
              {revealed ? ch : ""}
            </div>
            <div className="letter-dash"></div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// KEYBOARD COMPONENT
// ============================================================
function Keyboard({ guessed, word, onGuess, disabled }) {
  return (
    <div id="keyboard-rows">
      {KEYBOARD_ROWS.map((row) => (
        <div key={row} className="kb-row">
          {row.split("").map((letter) => {
            const isGuessed = guessed.has(letter);
            const isCorrect = isGuessed && word.includes(letter);
            const isWrong   = isGuessed && !word.includes(letter);
            return (
              <button
                key={letter}
                className={`kb-btn${isCorrect ? " correct" : ""}${isWrong ? " wrong" : ""}`}
                disabled={isGuessed || disabled}
                onClick={() => onGuess(letter)}
              >
                {letter}
              </button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ============================================================
// LIVES BAR COMPONENT
// ============================================================
function LivesBar({ wrongCount, maxWrong }) {
  return (
    <div className="lives-bar">
      {Array.from({ length: maxWrong }, (_, i) => (
        <span key={i} className={`life-heart${i >= maxWrong - wrongCount ? "" : " lost"}`}>
          ❤️
        </span>
      ))}
    </div>
  );
}

// ============================================================
// HOME PAGE
// ============================================================
function HomePage({ onPlay }) {
  return (
    <div>
      <div className="hm-main">

        <div className="hm-right home-right">

            <h2 className="welcome-title">Ready to play?</h2>
            <p className="welcome-sub">
              Guess the secret word letter by letter before the hangman meets his fate!
            </p>
          </div>
          <button className="btn-play" onClick={onPlay}>
            ▶ PLAY!
          </button>
          <div className="home-badges">

// ============================================================
// GAME RESULT OVERLAY
// ============================================================
function GameResult({ won, isTimeout, word, mode, score, onPlayAgain, onHome }) {
  let emoji, title, overlayClass;
  if (isTimeout) {
    emoji = score > 0 ? "⏰" : "💀";
    title = "Time's Up!";
    overlayClass = "timeout";
  } else if (won) {
    emoji = "🎉";
    title = "You Win!";
    overlayClass = "win";
  } else {
    emoji = "💀";
    title = "Game Over!";
    overlayClass = "lose";
  }

  return (
    <div className={`result-overlay ${overlayClass}`}>
      <div className="result-card">
        <span className="result-emoji">{emoji}</span>
        <h2 className="result-title">{title}</h2>
        {mode === "timetrial" && (
          <div>
            <div className="result-score">
              🌟 Score: <strong>{score}</strong> {score === 1 ? "word" : "words"}
            </div>
          </div>
        )}
        <div className="result-word">
          The word was: <strong>{word}</strong>
        </div>
        <div className="result-buttons">
          <button className="btn-play-again" onClick={onPlayAgain}>🔄 Play Again</button>
          <button className="btn-home-small" onClick={onHome}>🏠 Home</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// GAME BOARD
// ============================================================
function GameBoard({ mode, difficulty, onHome }) {
  const modeConfig = MODES[mode];
  const maxWrong   = modeConfig.maxWrong;

  const [wordData,       setWordData]       = useState(() => pickWord(difficulty));
  const [guessed,        setGuessed]        = useState(() => new Set());
  const [wrongCount,     setWrongCount]     = useState(0);
  const [gameOver,       setGameOver]       = useState(false);
  const [won,            setWon]            = useState(false);
  const [isTimeout,      setIsTimeout]      = useState(false);
  const [score,          setScore]          = useState(0);
  const [timeLeft,       setTimeLeft]       = useState(modeConfig.timer || 0);
  const [timerActive,    setTimerActive]    = useState(mode === "timetrial");
  const [showFlash,      setShowFlash]      = useState(false);

  const word     = wordData.word;
  const category = wordData.category;
  const hint     = wordData.hint;

  // ---- Timer countdown (Time Trial only) ----
  useEffect(() => {
    if (mode !== "timetrial" || !timerActive || gameOver) return;
    if (timeLeft <= 0) {
      setTimerActive(false);
      setGameOver(true);
      setIsTimeout(true);
      return;
    }
    const t = setTimeout(() => setTimeLeft((tl) => tl - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, timerActive, mode, gameOver]);

  // ---- Physical keyboard handler ----
  useEffect(() => {
    const onKey = (e) => {
      const l = e.key.toUpperCase();
      if (/^[A-Z]$/.test(l)) handleGuess(l);
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  });

  function handleGuess(letter) {
    if (gameOver || guessed.has(letter)) return;

    const newGuessed = new Set(guessed);
    newGuessed.add(letter);

    let newWrongCount = wrongCount;
    const letterInWord = word.includes(letter);

    if (!letterInWord) {
      newWrongCount = wrongCount + 1;
    }

    setGuessed(newGuessed);
    setWrongCount(newWrongCount);

    // Check win
    const allRevealed = word
      .split("")
      .filter((c) => c !== " ")
      .every((c) => newGuessed.has(c));

    if (allRevealed) {
      if (mode === "timetrial") {
        // +1 score, load new word immediately
        setScore((s) => s + 1);
        setWordData(pickWord(difficulty));
        setGuessed(new Set());
        setWrongCount(0);
        setShowFlash(true);
        setTimeout(() => setShowFlash(false), 800);
      } else {
        setGameOver(true);
        setWon(true);
      }
      return;
    }

    // Check lose
    const hardcoreFail = mode === "hardcore" && !letterInWord;
    const normalFail   = newWrongCount >= maxWrong;

    if (hardcoreFail || normalFail) {
      setWrongCount(maxWrong); // show full hangman
      setGameOver(true);
      setWon(false);
    }
  }

  function handlePlayAgain() {
    setWordData(pickWord(difficulty));
    setGuessed(new Set());
    setWrongCount(0);
    setGameOver(false);
    setWon(false);
    setIsTimeout(false);
    if (mode === "timetrial") {
      setScore(0);
      setTimeLeft(modeConfig.timer);
      setTimerActive(true);
    }
  }

  const wrongLetters = [...guessed].filter((l) => !word.includes(l));
  const isLost       = gameOver && !won;

  return (
    <div style={{ position: "relative" }}>
      {/* Time Trial HUD */}
      {mode === "timetrial" && (
        <div className="tt-bar">
          <div className={`tt-timer${timeLeft <= 10 ? " danger" : ""}`}>
            ⏱️ {timeLeft}s
          </div>
          <div className="tt-score">⭐ Score: {score}</div>
          {showFlash && <div className="tt-flash">+1 ✨</div>}
        </div>
      )}

      <div className="hm-main">
        <div className="hm-left">
          <div className="hm-svg-wrap">
            <HangmanDrawing wrongCount={wrongCount} isLost={isLost} />
          </div>
          <LivesBar wrongCount={wrongCount} maxWrong={maxWrong} />
          {wrongLetters.length > 0 && (
            <div className="wrong-letters">✗ {wrongLetters.join("  ")}</div>
          )}
          {mode === "hardcore" && (
            <div className="hardcore-badge">💀 ONE CHANCE!</div>
          )}
        </div>

        <div className="hm-right">
          <div className="hm-category-box">
            <div className="cat-label">🏷 Category</div>
            <div className="cat-name">{category}</div>
            <div className="hm-hint">💡 {hint}</div>
          </div>

          <div className="hm-word-box">
            <div className="word-label">🔤 Word to Guess</div>
            <WordDisplay word={word} guessed={guessed} />
          </div>
        </div>
      </div>

      <div className="hm-keyboard">
        <div className="kb-label">⌨️ Pick a Letter</div>
        <Keyboard
          guessed={guessed}
          word={word}
          onGuess={handleGuess}
          disabled={gameOver}
        />
      </div>

      {/* Game Result Overlay */}
      {gameOver && (
        <GameResult
          won={won}
          isTimeout={isTimeout}
          word={word}
          mode={mode}
          score={score}
          onPlayAgain={handlePlayAgain}
          onHome={onHome}
        />
      )}
    </div>
  );
}

// ============================================================
// APP — ROOT COMPONENT
// ============================================================
function App() {
  const [screen,     setScreen]     = useState("home");
  const [mode,       setMode]       = useState(null);
  const [difficulty, setDifficulty] = useState(null);

  const goHome = () => {
    setScreen("home");
    setMode(null);
    setDifficulty(null);
  };

  return (
    <div>
      <h1 className="hm-title">🎪 HANGMAN!</h1>
      <p className="hm-subtitle">Guess the word before it's too late!</p>

      {screen === "home" && (
        <HomePage onPlay={() => setScreen("modeSelect")} />
      )}

      {screen === "modeSelect" && (
        <ModeSelection
          onSelect={(m) => { setMode(m); setScreen("diffSelect"); }}
          onBack={goHome}
        />
      )}

      {screen === "diffSelect" && (
        <DifficultySelection
          mode={mode}
          onSelect={(d) => { setDifficulty(d); setScreen("modeDesc"); }}
          onBack={() => setScreen("modeSelect")}
        />
      )}

      {screen === "modeDesc" && (
        <ModeDescription
          mode={mode}
          difficulty={difficulty}
          onStart={() => setScreen("game")}
          onBack={() => setScreen("diffSelect")}
        />
      )}

      {screen === "game" && (
        <GameBoard
          key={`${mode}-${difficulty}-${Date.now()}`}
          mode={mode}
          difficulty={difficulty}
          onHome={goHome}
        />
      )}
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById("hm-root"));
root.render(<App />);
